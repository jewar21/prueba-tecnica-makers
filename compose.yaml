services:
  postgres:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_DB: loans_db
      POSTGRES_USER: ${DB_USERNAME:-loans_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Define DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - loans_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  loans_postgres_data:
