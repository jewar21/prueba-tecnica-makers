spring.application.name=loans

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=${JWT_EXPIRATION:PT30M}

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}

app.seed.user-email=${SEED_USER_EMAIL:}
app.seed.user-password=${SEED_USER_PASSWORD:}
app.seed.admin-email=${SEED_ADMIN_EMAIL:}
app.seed.admin-password=${SEED_ADMIN_PASSWORD:}
