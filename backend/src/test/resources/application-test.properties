spring.datasource.url=jdbc:h2:mem:loans_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

security.jwt.secret=test-only-secret-key-32-characters
security.jwt.expiration=PT30M

app.cors.allowed-origin=http://localhost:4200
